<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="SENTINEL">
  <defs>
    <linearGradient id="s-border" x1="10" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#4edea3"/>
    </linearGradient>
    <linearGradient id="s-fill" x1="32" y1="12" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8aebff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.06"/>
    </linearGradient>
    <radialGradient id="s-pupil" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(32 34) rotate(90) scale(8)">
      <stop stop-color="#a2eeff"/>
      <stop offset="0.45" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#006877"/>
    </radialGradient>
  </defs>
  <!-- chip -->
  <rect width="64" height="64" rx="15" fill="#070d1f"/>
  <!-- shield -->
  <path
    d="M32 9 49 17.5V35.2c0 11.2-8.6 18.6-17 20.8-8.4-2.2-17-9.6-17-20.8V17.5L32 9Z"
    fill="#151b2d"
    stroke="url(#s-border)"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <path
    d="M32 9 49 17.5V35.2c0 11.2-8.6 18.6-17 20.8-8.4-2.2-17-9.6-17-20.8V17.5L32 9Z"
    fill="url(#s-fill)"
  />
  <!-- scan arc -->
  <path
    d="M20 38a14 14 0 0 1 24-8"
    stroke="#4edea3"
    stroke-width="1.75"
    stroke-linecap="round"
    opacity="0.85"
  />
  <!-- eye / lens -->
  <ellipse cx="32" cy="34" rx="12" ry="8.5" stroke="#22d3ee" stroke-width="1.5" opacity="0.45"/>
  <circle cx="32" cy="34" r="6" fill="url(#s-pupil)"/>
  <circle cx="34" cy="31" r="2" fill="#e8fdff" opacity="0.55"/>
  <!-- radar beam -->
  <path d="M32 34 46 20" stroke="#4edea3" stroke-width="2.25" stroke-linecap="round"/>
</svg>
